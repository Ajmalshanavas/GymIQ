{% extends 'base.html' %}
{% load static %}

{% block title %}Change Password{% endblock %}

{% block content %}

<div class="dashboard-wrapper">

  <div class="dashboard-header">
    <div>
      <h1 class="dashboard-title">CHANGE <span>PASSWORD</span></h1>
      <p class="dashboard-sub">Keep your account secure 🔒</p>
    </div>
    <a href="{% url 'profile' %}" class="btn-ghost">
      <i class="bi bi-arrow-left"></i> Back to Profile
    </a>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="dashboard-card">

        {% if success %}
          <div class="gymiq-alert-success mb-4">
            <i class="bi bi-check-circle me-2"></i> {{ success }}
          </div>
        {% endif %}

        {% if error %}
          <div class="gymiq-alert mb-4">
            <i class="bi bi-exclamation-circle me-2"></i> {{ error }}
          </div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}

          <div class="form-group mb-3">
            <label class="gymiq-label">Current Password *</label>
            <input type="password"
                   name="current_password"
                   class="gymiq-input"
                   placeholder="Enter current password"
                   required>
          </div>

          <div class="form-group mb-3">
            <label class="gymiq-label">New Password *</label>
            <input type="password"
                   name="new_password"
                   class="gymiq-input"
                   placeholder="Min 8 characters"
                   required>
          </div>

          <div class="form-group mb-4">
            <label class="gymiq-label">Confirm New Password *</label>
            <input type="password"
                   name="confirm_password"
                   class="gymiq-input"
                   placeholder="Repeat new password"
                   required>
          </div>

          <button type="submit" class="btn-primary-custom w-100" style="font-size:1rem;padding:1rem;">
            <i class="bi bi-lock me-2"></i> Update Password
          </button>

        </form>
      </div>
    </div>
  </div>

</div>

{% endblock %}
