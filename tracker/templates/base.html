{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GymIQ — {% block title %}Train Smarter{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'css/style.css' %}"/>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <a href="#" class="nav-logo">Gym<span>IQ</span></a>
  <div class="nav-links d-none d-md-flex align-items-center">
    <a href="{% url 'home'    %}">Home</a>
    {% if request.user.is_authenticated %}
      <a href="#">Dashboard</a>
      <a href="#" class="btn-nav">Logout</a>
    {% else %}
      <a href="#">Register</a>
      <a href="#" class="btn-nav">Login</a>
    {% endif %}
  </div>
</nav>

<!-- PAGE CONTENT -->
{% block content %}
{% endblock %}

<!-- FOOTER -->
<footer>
  <p>Built with <span>♥</span> by GymIQ · © 2026 All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/script.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
