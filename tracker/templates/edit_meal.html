{% extends 'base.html' %}
{% load static %}

{% block title %}Edit — {{ meal.meal_name }}{% endblock %}

{% block content %}

<div class="dashboard-wrapper">

  <!-- HEADER -->
  <div class="dashboard-header">
    <div>
      <h1 class="dashboard-title">EDIT <span>MEAL</span></h1>
      <p class="dashboard-sub">Update your nutrition entry 🥗</p>
    </div>
    <a href="{% url 'dashboard' %}" class="btn-ghost">
      <i class="bi bi-arrow-left"></i> Cancel
    </a>
  </div>

  {% if error %}
    <div class="gymiq-alert mb-4">
      <i class="bi bi-exclamation-circle me-2"></i> {{ error }}
    </div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}

    <div class="dashboard-card mb-4">
      <div class="dashboard-card-header">
        <h3 class="dashboard-card-title">MEAL DETAILS</h3>
      </div>

      <!-- MEAL NAME + DATE -->
      <div class="form-grid-2 mb-3">
        <div class="form-group">
          <label class="gymiq-label">Meal Name *</label>
          <input
            type="text"
            name="meal_name"
            class="gymiq-input"
            value="{{ meal.meal_name }}"
            required
          >
        </div>
        <div class="form-group">
          <label class="gymiq-label">Date *</label>
          <input
            type="date"
            name="date"
            class="gymiq-input"
            value="{{ meal.date }}"
            required
          >
        </div>
      </div>

      <!-- CALORIES -->
      <div class="form-group mb-3">
        <label class="gymiq-label">Calories *</label>
        <input
          type="number"
          name="calories"
          class="gymiq-input"
          value="{{ meal.calories }}"
          min="0"
          required
        >
      </div>

      <!-- MACROS -->
      <div class="form-group mb-2">
        <span class="gymiq-label">Macros (optional)</span>
      </div>
      <div class="form-grid-3">
        <div class="form-group">
          <label class="gymiq-label macro-label protein-label">
            <i class="bi bi-lightning-charge-fill"></i> Protein (g)
          </label>
          <input
            type="number"
            name="protein"
            class="gymiq-input"
            value="{{ meal.protein }}"
            min="0"
            step="0.1"
          >
        </div>
        <div class="form-group">
          <label class="gymiq-label macro-label carbs-label">
            <i class="bi bi-bar-chart-fill"></i> Carbs (g)
          </label>
          <input
            type="number"
            name="carbs"
            class="gymiq-input"
            value="{{ meal.carbs }}"
            min="0"
            step="0.1"
          >
        </div>
        <div class="form-group">
          <label class="gymiq-label macro-label fat-label">
            <i class="bi bi-droplet-fill"></i> Fat (g)
          </label>
          <input
            type="number"
            name="fat"
            class="gymiq-input"
            value="{{ meal.fat }}"
            min="0"
            step="0.1"
          >
        </div>
      </div>

    </div>

    <!-- SAVE BUTTON -->
    <div class="text-center mb-5">
      <button type="submit" class="btn-primary-custom" style="font-size:1rem; padding:1rem 3rem;">
        <i class="bi bi-check-circle me-2"></i> Save Changes
      </button>
    </div>

  </form>

</div>

{% endblock %}
